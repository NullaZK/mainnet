---
# Role: nulla-relay -- deploy binary, chainspec, systemd unit; start validator.
#
# Expects in roles/nulla-relay/files/:
#   nulla-relay             -- compiled relay binary
#   nulla-mainnet.raw.json  -- generated by build-spec.py in Play 3

- name: Copy nulla-relay binary
  copy:
    src: nulla-relay
    dest: "{{ relay_binary }}"
    owner: root
    group: root
    mode: "0755"
  notify: restart nulla-relay

- name: Copy production chainspec
  copy:
    src: nulla-mainnet.raw.json
    dest: "{{ relay_chainspec }}"
    owner: root
    group: "{{ nulla_group }}"
    mode: "0644"
  notify: restart nulla-relay

- name: Install systemd unit
  template:
    src: nulla-relay.service.j2
    dest: /etc/systemd/system/nulla-relay.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart nulla-relay

- name: Enable and start nulla-relay
  systemd:
    name: nulla-relay
    enabled: true
    state: started
    daemon_reload: true
